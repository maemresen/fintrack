<div class="flex flex-row h-full">
  <p-menu [model]="items" styleClass="w-full h-full">
    <ng-template pTemplate="start">
    </ng-template>
    <ng-template pTemplate="submenuheader" let-items>
    </ng-template>
    <ng-template pTemplate="item" let-item>
      <a pRipple class="flex align-items-center p-menuitem-link">
        <span [class]="item.icon"></span>
        <span class="ml-2">{{ item.label }}</span>
        <p-badge *ngIf="item.badge" class="ml-auto" [value]="item.badge"/>
        <span *ngIf="item.shortcut" class="ml-auto border-1 surface-border border-round surface-100 text-xs p-1">
                {{ item.shortcut }}
            </span>
      </a>
    </ng-template>
  </p-menu>
  <div class="w-full max-h-full overflow-y-auto" style="min-width: 200px; min-height: 100px">
  </div>
</div>
